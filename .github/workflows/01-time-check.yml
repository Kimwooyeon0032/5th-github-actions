name: Time Check
run-name: "시간 확인 - ${{github.actor}}"
on:
  workflow_dispatch

jobs:
  show-time:
    runs-on: ubuntu-latest
    steps:
      - name: 현재 UTC 시간
        run: date -u
        
      - name: 현재 KST 시간
        run: TZ='Asia/Seoul' date
        
      - name: 시간 정보 종
        run: |
          echo "=== 시간 정보 ==="
          UTC: $(date -u)
          KST: $(TZ='Asia/Seoul' date)
          Unix Timestamp: $(date +%s)
          요일: $(date +%A)
          echo "=== 끝 ==="
